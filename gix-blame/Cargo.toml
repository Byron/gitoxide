[package]
name = "gix-blame"
version = "0.0.0"
repository = "https://github.com/Byron/gitoxide"
license = "MIT OR Apache-2.0"
description = "A crate of the gitoxide project dedicated implementing a 'blame' algorithm"
authors = ["Christoph Rüßler <christoph.ruessler@mailbox.org>", "Sebastian Thiel <sebastian.thiel@icloud.com>"]
edition = "2021"
rust-version = "1.65"

[lib]
doctest = false

[dependencies]

[dev-dependencies]
gix-diff = { path = "../gix-diff" }
gix-filter = { path = "../gix-filter" }
gix-fs = { path = "../gix-fs" }
gix-hash = { path = "../gix-hash" }
gix-index = { path = "../gix-index" }
gix-object = { path = "../gix-object" }
gix-odb = { path = "../gix-odb" }
gix-ref = { path = "../gix-ref" }
gix-testtools = { path = "../tests/tools" }
gix-traverse = { path = "../gix-traverse" }
gix-worktree = { path = "../gix-worktree" }
